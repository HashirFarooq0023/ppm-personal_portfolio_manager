services:
  - type: web
    name: ppm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard (secret)
      - key: DB_NAME
        value: ppm
      - key: CLERK_SECRET_KEY
        sync: false          # Set manually in Render dashboard (secret)
      - key: CLERK_PUBLISHABLE_KEY
        sync: false          # Set manually in Render dashboard (secret)
      - key: CORS_ORIGINS
        value: "https://ppm-personal-portfolio-manager-qsfto20jk.vercel.app,https://ppm-personal-portfolio-manager-1qvuw5chg.vercel.app"
